syntax = "proto3";

package rules.v1;

import "rules/v1/action.proto";

enum Type {
  TYPE_UNSPECIFIED = 0;
  TYPE_BEHAVIOUR = 1;
  TYPE_YARA = 2;
}

message Label {
  string key = 1;
  string value = 2;
}

message Rule {
  Type type = 1;
  string id = 2;
  string name = 3;
  string description = 4;
  string version = 5;
  string min_engine_version = 6;
  string condition = 7;
  string patterns = 8;
  optional string output = 9;
  bool enabled = 10;
  repeated Action action = 11;
  repeated string tags = 12;
  repeated string imports = 13;
  repeated Label labels = 14;
}

message Macro {
  string id = 1;
  optional string description = 2;
  string expr = 3;
  repeated string list = 4;
}

message RuleSet {
  repeated Macro macros = 1;
  repeated Rule rules = 2;
}

message ListRequest {
  bool list_yara = 1;
}

message ListResponse {
  RuleSet ruleset = 1;
}

message StreamRequest {
  string endpoint_id = 1;
}

message StreamResponse {
  RuleSet ruleset = 1;
}

service RuleService {
  rpc List(ListRequest) returns (ListResponse);
  rpc Stream(StreamRequest) returns (stream StreamResponse);
}
